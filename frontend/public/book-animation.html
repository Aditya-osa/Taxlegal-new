<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: "Playfair Display", serif;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
            margin: 0 auto;
        }

        /* ── Section ── */
        .book-showcase-section {
            padding: 80px 0;
            background: #0a0a0a;
        }

        .section-title {
            text-align: center;
            margin-bottom: 10px;
        }

        .section-title h2 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .section-title p {
            color: #c4a059;
        }

        /* ── Grid ── */
        .book-grid {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin-top: 60px;
            perspective: 2500px;
        }

        /* ── Book Container ── */
        .book-container {
            width: 240px;
            height: 350px;
            position: relative;
            cursor: pointer;
        }

        /* ── Book ── */
        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(-15deg) rotateX(5deg);
            transition: transform 0.6s ease;
        }

        /* Static back page visible when cover opens */
        .book-static-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 2px 4px 4px 2px;
            box-shadow: inset 10px 0 30px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 0;
        }

        .page-content h3 {
            color: #c4a059;
            font-family: "Playfair Display", serif;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .page-content p {
            color: #333;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .page-content .author {
            display: block;
            margin-top: 20px;
            color: #888;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Hinge — the element that swings open */
        .book-hinge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Front cover */
        .book-cover-front {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            z-index: 2;
            border-radius: 2px 4px 4px 2px;
        }

        .book-cover-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px 4px 4px 2px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.4);
        }

        /* Inside of the cover */
        .book-cover-back-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f4f4;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            border-left: 5px solid #c4a059;
            box-shadow: inset -10px 0 20px rgba(0, 0, 0, 0.1);
        }

        /* ── Hover animations ── */
        .book-container:hover {
            z-index: 50;
        }

        .book-container:hover .book-hinge {
            transform: rotateY(-105deg);
            box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .book-container:hover .book {
            transform: rotateY(-10deg) rotateX(5deg);
        }
    </style>
</head>
<body>

<section class="book-showcase-section">
    <div class="container">
        <div class="section-title">
            <h2>The Voice Behind The Books</h2>
            <p>Varun Sharma</p>
        </div>

        <div class="book-grid">

            <!-- Book 1 -->
            <div class="book-container">
                <div class="book">
                    <div class="book-static-page" style="padding: 0;">
                        <img src="img/backpage.png" alt="Inner Page Image" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div class="book-hinge">
                        <div class="book-cover-front">
                            <img src="img/gst.jpg" alt="Front Cover">
                        </div>
                        <div class="book-cover-back-face"></div>
                    </div>
                </div>
            </div>

            <!-- Book 2 -->
            <div class="book-container">
                <div class="book">
                    <div class="book-static-page" style="padding: 0;">
                        <img src="img/backpage3.jpeg" alt="Inner Page Image" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div class="book-hinge">
                        <div class="book-cover-front">
                            <img src="img/book1.jpeg" alt="Front Cover">
                        </div>
                        <div class="book-cover-back-face"></div>
                    </div>
                </div>
            </div>

            <!-- Book 3 -->
            <div class="book-container">
                <div class="book">
                    <div class="book-static-page" style="padding: 0;">
                        <img src="img/backpage2.jpeg" alt="Inner Page Image" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div class="book-hinge">
                        <div class="book-cover-front">
                            <img src="img/book2.jpeg" alt="Front Cover">
                        </div>
                        <div class="book-cover-back-face"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
