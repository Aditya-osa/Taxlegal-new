<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.google-analytics.com" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Google Search Console Verification (from .env on build) -->
    <meta name="google-site-verification" content="%VITE_GSC_VERIFICATION%" />

    <title>Tax Legal Synergy | Tax Litigation, GST &amp; Corporate Legal Advisory</title>
    <meta name="description" content="Tax Legal Synergy provides expert legal advisory, GST consulting, tax litigation, corporate compliance, and strategic legal solutions across India." />
    
    <!-- Fallback OG Tags for Scrapers that don't execute JS (like WhatsApp) -->
    <meta property="og:title" content="Tax Legal Synergy | Tax Litigation, GST &amp; Corporate Legal Advisory" />
    <meta property="og:description" content="Tax Legal Synergy provides expert legal advisory, GST consulting, tax litigation, corporate compliance, and strategic legal solutions across India." />
    <meta property="og:image" content="https://taxlegalsynergy.com/assets/social-preview.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://taxlegalsynergy.com" />
    <meta property="og:site_name" content="Tax Legal Synergy" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
